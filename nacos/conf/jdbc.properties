# JDBC Configuration for Nacos

# MySQL 数据源配置
db.user=root
db.password=123456
db.url=jdbc:mysql://mysql:3306/nacos-mysql?useUnicode=true&characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
db.pool.config.driverClassName=com.mysql.cj.jdbc.Driver
db.pool.config.connectionTimeout=30000
db.pool.config.maximumPoolSize=20
db.pool.config.minimumIdle=5
db.pool.config.idleTimeout=600000
db.pool.config.maxLifetime=1800000

# 连接池类型（HikariCP / Druid）
db.pool.config.poolName=HikariCP

# 数据库初始化配置（首次启动时自动执行）
# database.plugin.mysql.schema.sql=/nacos/conf/mysql-schema.sql
# database.plugin.mysql.schema.version=1.4.0

# 是否自动创建数据库表（生产环境建议设为false）
# database.plugin.mysql.schema.init.enabled=true
# database.plugin.mysql.schema.init.database.schema=nacos



