# 1. 基础配置
server.port=8858
spring.cloud.inetutils.preferred-networks=eth0

# 2. Nacos 连接配置
# Nacos服务端地址（同compose网络中的服务名）
nacos.server-addr=nacos:8848

# 3. 规则持久化配置
# 流控规则配置
sentinel.nacos.flow.server-addr=${nacos.server-addr}
sentinel.nacos.flow.data-id=${spring.application.name}-flow-rules
sentinel.nacos.flow.group-id=SENTINEL_GROUP
sentinel.nacos.flow.rule-type=flow

# 降级规则配置
sentinel.nacos.degrade.server-addr=${nacos.server-addr}
sentinel.nacos.degrade.data-id=${spring.application.name}-degrade-rules
sentinel.nacos.degrade.group-id=SENTINEL_GROUP
sentinel.nacos.degrade.rule-type=degrade

# 4. 日志与认证配置
logging.level.com.alibaba.csp.sentinel.dashboard=INFO
csp.sentinel.dashboard.auth.username=sentinel
csp.sentinel.dashboard.auth.password=sentinel