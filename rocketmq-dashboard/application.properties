# RocketMQ Dashboard 配置文件

# 服务端口
server.port=8080

# 命名服务器地址（多个用分号分隔）
rocketmq.config.namesrvAddr=namesrv:9876

# 是否开启鉴权（默认false）
rocketmq.config.isVIPChannel=false

# 数据路径
rocketmq.config.dataPath=/root/data

# 登录用户名和密码（开启鉴权时使用）
# rocketmq.config.loginRequired=true
# rocketmq.config.accessKey=rocketmq
# rocketmq.config.secretKey=12345678

# 线程池配置
rocketmq.config.threadPoolSize=10

# 连接超时时间（毫秒）
rocketmq.config.connectTimeoutMillis=5000

# 是否启用集群模式
rocketmq.config.enableDashBoardCollect=true

# WebSocket 配置
rocketmq.config.wsPort=8080

# 消息轨迹查询配置
rocketmq.config.traceTopic=RMQ_SYS_TRACE_TOPIC

# 语言设置（zh_CN/en_US）
rocketmq.config.language=zh_CN

# 日志级别
logging.level.root=INFO
logging.level.org.apache.rocketmq=INFO